<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1600" font-family="'Segoe UI', 'Inter', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a" />
      <stop offset="100%" style="stop-color:#1a1a2e" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="50%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#a78bfa" />
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#94a3b8">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#60a5fa">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#34d399">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#f87171">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#a78bfa">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#fbbf24">
      <polygon points="0 0, 10 3.5, 0 7" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1600" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.025">
    <line x1="200" y1="0" x2="200" y2="1600" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="1600" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="1600" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="1600" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="1600" stroke="#fff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="1600" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- ===== TITLE ===== -->
  <text x="700" y="44" text-anchor="middle" fill="url(#titleGrad)" font-size="28" font-weight="700" letter-spacing="2">SparMate — Application Flowchart</text>
  <text x="700" y="68" text-anchor="middle" fill="#94a3b8" font-size="13" letter-spacing="1">Adaptive Coaching Loop · Edge AI Pipeline · User Journey</text>
  <line x1="100" y1="82" x2="1300" y2="82" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <!-- ===== ZONE BACKGROUNDS ===== -->
  <!-- Edge / On-Device zone -->
  <rect x="80" y="92" width="600" height="1060" rx="20" fill="#027DFD" fill-opacity="0.03" stroke="#027DFD" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="8,4"/>
  <text x="100" y="116" fill="#60a5fa" font-size="11" font-weight="600" letter-spacing="1" opacity="0.6">📱 ON-DEVICE (EDGE)</text>

  <!-- Cloud zone -->
  <rect x="720" y="92" width="600" height="1060" rx="20" fill="#ff6b6b" fill-opacity="0.03" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="8,4"/>
  <text x="740" y="116" fill="#ff6b6b" font-size="11" font-weight="600" letter-spacing="1" opacity="0.6">☁️ CLOUD (SERVER)</text>

  <!-- ===== FLOWCHART NODES ===== -->

  <!-- ① START — Terminal -->
  <rect x="295" y="130" width="170" height="42" rx="21" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="380" y="156" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">START</text>

  <!-- Arrow: START → Auth -->
  <path d="M 380 172 L 380 208" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>

  <!-- ② Authentication -->
  <rect x="250" y="210" width="260" height="60" rx="12" fill="#1e1e2e" stroke="#6366f1" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="380" y="236" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">🔐 Login / Register</text>
  <text x="380" y="256" text-anchor="middle" fill="#94a3b8" font-size="10">Laravel Sanctum Token Auth</text>

  <!-- Arrow: Auth → Dashboard -->
  <path d="M 380 270 L 380 310" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>

  <!-- ③ Dashboard -->
  <rect x="230" y="312" width="300" height="70" rx="12" fill="#1e1e2e" stroke="#027DFD" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="380" y="342" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="600">📊 Dashboard</text>
  <text x="380" y="362" text-anchor="middle" fill="#94a3b8" font-size="10">BKT Mastery Scores · Lesson Recommendations · Match History</text>

  <!-- Arrow: Dashboard → Decision -->
  <path d="M 380 382 L 380 424" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>

  <!-- ④ DECISION: Select Mode -->
  <polygon points="380,425 500,475 380,525 260,475" fill="#1e1e2e" stroke="#fbbf24" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="380" y="472" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Select</text>
  <text x="380" y="488" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Mode?</text>

  <!-- Branch LEFT: View Lessons -->
  <path d="M 260 475 L 160 475" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <text x="210" y="466" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">LESSONS</text>

  <rect x="95" y="450" width="70" height="50" rx="10" fill="#1e1e2e" stroke="#a78bfa" stroke-width="1"/>
  <text x="130" y="472" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">📚</text>
  <text x="130" y="488" text-anchor="middle" fill="#c4b5fd" font-size="9">Study</text>

  <!-- Loop back: Lessons → Dashboard -->
  <path d="M 130 450 L 130 347 L 228 347" stroke="#a78bfa" stroke-width="1.5" fill="none" marker-end="url(#arrowPurple)" stroke-dasharray="5,3"/>

  <!-- Branch DOWN: Start Sparring -->
  <path d="M 380 525 L 380 568" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>
  <text x="405" y="550" fill="#86efac" font-size="9" font-weight="600">SPAR</text>

  <!-- ⑤ Select AI Persona -->
  <rect x="220" y="570" width="320" height="80" rx="12" fill="#1e1e2e" stroke="#8B5CF6" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="380" y="596" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">♟️ Select AI Persona</text>
  <!-- Persona badges -->
  <rect x="240" y="610" width="80" height="24" rx="6" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="0.5"/>
  <text x="280" y="626" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">Tactical</text>
  <rect x="330" y="610" width="90" height="24" rx="6" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="375" y="626" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Positional</text>
  <rect x="430" y="610" width="90" height="24" rx="6" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="0.5"/>
  <text x="475" y="626" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Universal</text>

  <!-- Arrow: Persona → Game Session -->
  <path d="M 380 650 L 380 695" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>

  <!-- ⑥ Live Game Session (large block) -->
  <rect x="190" y="697" width="380" height="110" rx="14" fill="#1e1e2e" stroke="#027DFD" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="380" y="724" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="700">⚔️ Live Sparring Session</text>
  <line x1="210" y1="734" x2="550" y2="734" stroke="#3b3b5c" stroke-width="0.5"/>
  <text x="210" y="754" fill="#94a3b8" font-size="10">• Stockfish C++ via Dart FFI</text>
  <text x="210" y="772" fill="#94a3b8" font-size="10">• Real-Time Pressure Gauge</text>
  <text x="400" y="754" fill="#94a3b8" font-size="10">• UCI Heuristic Params</text>
  <text x="400" y="772" fill="#94a3b8" font-size="10">• Dart Isolate (BG Thread)</text>
  <rect x="210" y="782" width="340" height="18" rx="4" fill="#8B5CF6" fill-opacity="0.1" stroke="#8B5CF6" stroke-width="0.5"/>
  <text x="380" y="795" text-anchor="middle" fill="#a78bfa" font-size="9">Edge Inference · 312ms Avg · Fully Offline</text>

  <!-- Arrow: Game → Decision Game Over -->
  <path d="M 380 807 L 380 852" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>

  <!-- ⑦ DECISION: Game Over? -->
  <polygon points="380,853 480,893 380,933 280,893" fill="#1e1e2e" stroke="#fbbf24" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="380" y="890" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Game</text>
  <text x="380" y="906" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Over?</text>

  <!-- Branch RIGHT: No (continue playing) -->
  <path d="M 480 893 L 590 893 L 590 752 L 572 752" stroke="#f87171" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="5,3"/>
  <rect x="586" y="858" width="36" height="18" rx="4" fill="#1e1e2e" stroke="#f87171" stroke-width="0.5"/>
  <text x="604" y="871" text-anchor="middle" fill="#fca5a5" font-size="9">NO</text>

  <!-- Branch DOWN: Yes (game complete) -->
  <path d="M 380 933 L 380 978" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>
  <text x="400" y="960" fill="#86efac" font-size="9" font-weight="600">YES</text>

  <!-- ⑧ ONNX Mistake Classification -->
  <rect x="220" y="980" width="320" height="65" rx="12" fill="#1e1e2e" stroke="#f39c12" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="380" y="1007" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">🧠 ONNX Mistake Classification</text>
  <text x="380" y="1028" text-anchor="middle" fill="#94a3b8" font-size="10">Random Forest · Tactical Oversight vs Positional Error · Offline</text>

  <!-- Arrow: ONNX → PGN Generation -->
  <path d="M 380 1045 L 380 1080" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>

  <!-- ⑨ Generate PGN + Payload -->
  <rect x="250" y="1082" width="260" height="50" rx="12" fill="#1e1e2e" stroke="#027DFD" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="380" y="1104" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">📝 Generate PGN Payload</text>
  <text x="380" y="1120" text-anchor="middle" fill="#94a3b8" font-size="10">Match Data + Classified Blunders</text>

  <!-- ===== CROSS TO CLOUD ZONE ===== -->
  <!-- Arrow: PGN → Laravel API (horizontal crossing) -->
  <path d="M 510 1107 L 810 1107" stroke="#ff6b6b" stroke-width="2.5" fill="none" marker-end="url(#arrowRed)"/>
  <rect x="608" y="1082" width="150" height="20" rx="6" fill="#1e1e2e" stroke="#ff6b6b" stroke-width="0.8"/>
  <text x="683" y="1096" text-anchor="middle" fill="#fca5a5" font-size="10">POST /api/match →</text>

  <!-- Cloud divider indicator -->
  <line x1="700" y1="130" x2="700" y2="1140" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,6" opacity="0.15"/>

  <!-- ⑩ Laravel API Gateway (Cloud) -->
  <rect x="812" y="1072" width="300" height="70" rx="12" fill="#1e1e2e" stroke="#ff6b6b" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="962" y="1100" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">🔄 Laravel 13 API Gateway</text>
  <text x="962" y="1120" text-anchor="middle" fill="#94a3b8" font-size="10">Validate Token · Store Match · Forward Payload</text>

  <!-- Arrow: Laravel → FastAPI -->
  <path d="M 962 1142 L 962 1182" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>

  <!-- ⑪ FastAPI BKT Update (Cloud) -->
  <rect x="812" y="1184" width="300" height="70" rx="12" fill="#1e1e2e" stroke="#00c9a7" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="962" y="1212" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="600">📈 FastAPI BKT Engine</text>
  <text x="962" y="1232" text-anchor="middle" fill="#94a3b8" font-size="10">P(Learn) · P(Slip) · P(Guess) · Posterior Update</text>

  <!-- Arrow: FastAPI → PostgreSQL -->
  <path d="M 962 1254 L 962 1294" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>

  <!-- ⑫ PostgreSQL Update (Cloud) -->
  <rect x="832" y="1296" width="260" height="60" rx="12" fill="#1e1e2e" stroke="#5b9bd5" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="962" y="1322" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="600">🗄️ PostgreSQL Update</text>
  <text x="962" y="1340" text-anchor="middle" fill="#94a3b8" font-size="10">JSONB bkt_matrix · curriculum_state</text>

  <!-- Arrow: PostgreSQL → Lesson Generation -->
  <path d="M 962 1356 L 962 1396" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>

  <!-- ⑬ Generate Lesson Recommendations -->
  <rect x="812" y="1398" width="300" height="55" rx="12" fill="#1e1e2e" stroke="#a78bfa" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="962" y="1422" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">📚 Lesson Recommendations</text>
  <text x="962" y="1440" text-anchor="middle" fill="#94a3b8" font-size="10">Content-Based Filtering · Skill Gap Targeting</text>

  <!-- Arrow: Lesson Recs → back to Flutter (horizontal crossing back) -->
  <path d="M 812 1425 L 510 1425 L 510 1375 L 510 1340" stroke="#60a5fa" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)" stroke-dasharray="6,3"/>
  <rect x="608" y="1410" width="150" height="20" rx="6" fill="#1e1e2e" stroke="#60a5fa" stroke-width="0.8"/>
  <text x="683" y="1424" text-anchor="middle" fill="#60a5fa" font-size="10">← Lesson Plan JSON</text>

  <!-- ⑭ Post-Game Analysis Screen (back on device) -->
  <rect x="360" y="1280" width="300" height="60" rx="12" fill="#1e1e2e" stroke="#027DFD" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="510" y="1306" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="600">📊 Post-Game Analysis</text>
  <text x="510" y="1326" text-anchor="middle" fill="#94a3b8" font-size="10">Updated BKT Scores · Mistake Breakdown · New Lessons</text>

  <!-- Arrow: Post-Game → Decision Play Again? -->
  <path d="M 380 1310 L 310 1310 L 310 1400" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrowW)"/>

  <!-- ⑮ DECISION: Play Again? -->
  <polygon points="310,1400 410,1440 310,1480 210,1440" fill="#1e1e2e" stroke="#fbbf24" stroke-width="1.5" filter="url(#cardShadow)"/>
  <text x="310" y="1437" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Play</text>
  <text x="310" y="1453" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">Again?</text>

  <!-- Branch LEFT: No → Dashboard -->
  <path d="M 210 1440 L 130 1440 L 130 1170 L 130 382 L 228 382" stroke="#f87171" stroke-width="1.5" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="5,3"/>
  <rect x="140" y="1428" width="36" height="18" rx="4" fill="#1e1e2e" stroke="#f87171" stroke-width="0.5"/>
  <text x="158" y="1441" text-anchor="middle" fill="#fca5a5" font-size="9">NO</text>

  <!-- Branch DOWN: Yes → Select Persona -->
  <path d="M 310 1480 L 310 1530 L 100 1530 L 100 620 L 218 620" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrowGreen)" stroke-dasharray="6,3"/>
  <rect x="296" y="1492" width="38" height="18" rx="4" fill="#1e1e2e" stroke="#34d399" stroke-width="0.5"/>
  <text x="315" y="1505" text-anchor="middle" fill="#86efac" font-size="9">YES</text>

  <!-- ===== LEGEND ===== -->
  <rect x="100" y="1555" width="1200" height="34" rx="8" fill="#16162a" stroke="#3b3b5c" stroke-width="1"/>
  <circle cx="160" cy="1572" r="5" fill="#027DFD" opacity="0.7"/>
  <text x="172" y="1577" fill="#60a5fa" font-size="10">On-Device</text>
  <circle cx="280" cy="1572" r="5" fill="#ff6b6b" opacity="0.7"/>
  <text x="292" y="1577" fill="#fca5a5" font-size="10">Laravel API</text>
  <circle cx="395" cy="1572" r="5" fill="#00c9a7" opacity="0.7"/>
  <text x="407" y="1577" fill="#6ee7b7" font-size="10">FastAPI BKT</text>
  <circle cx="520" cy="1572" r="5" fill="#5b9bd5" opacity="0.7"/>
  <text x="532" y="1577" fill="#93c5fd" font-size="10">PostgreSQL</text>
  <circle cx="635" cy="1572" r="5" fill="#f39c12" opacity="0.7"/>
  <text x="647" y="1577" fill="#fbbf24" font-size="10">Edge ML</text>
  <line x1="735" y1="1572" x2="760" y2="1572" stroke="#94a3b8" stroke-width="2"/>
  <text x="768" y="1577" fill="#94a3b8" font-size="10">Flow</text>
  <line x1="815" y1="1572" x2="840" y2="1572" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="848" y="1577" fill="#94a3b8" font-size="10">Loop-back</text>
  <polygon points="940,1567 950,1572 940,1577" fill="#fbbf24"/>
  <text x="958" y="1577" fill="#fbbf24" font-size="10">Decision</text>
</svg>
